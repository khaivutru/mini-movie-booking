<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Movie Ticket Pro - KhaiLeXuan ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hiệu ứng fadeInUp cho từng thẻ phim */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card {
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0; /* Bắt đầu ẩn để chạy animation */
        }
        /* Hiệu ứng kính mờ (Glassmorphism) */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0a0f1e] text-slate-200 min-h-screen font-sans">

    <nav class="glass sticky top-0 z-50 py-4 mb-10">
        <div class="container mx-auto px-6 flex justify-between items-center overflow-x-auto gap-4">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight whitespace-nowrap">
                MOVIE<span class="text-white">TICKET</span><span class="text-cyan-400">.</span>PRO
            </h1>
            <div class="flex items-center gap-2 glass px-4 py-2 rounded-full text-sm text-slate-400 whitespace-nowrap">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-cyan-500"></span>
                </span>
                Server: <span class="font-mono text-cyan-400">192.168.0.200</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 pb-20">
        <div class="mb-12 flex justify-between items-center gap-4 flex-wrap">
            <h2 class="text-4xl font-bold text-white tracking-tight">
                Phim Bom Tấn <span class="text-slate-500 text-3xl font-medium">| Đang Chiếu</span>
            </h2>
            <button onclick="fetchMovies()" class="glass px-5 py-2.5 rounded-xl hover:bg-slate-800 transition flex items-center gap-2 group whitespace-nowrap">
                <svg class="w-5 h-5 text-slate-400 group-hover:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 003.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Làm mới
            </button>
        </div>
        
        <div id="movie-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full flex flex-col items-center justify-center pt-20 text-slate-600">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-500 mb-4"></div>
                <p class="text-xl">Đang tải phim từ hệ thống...</p>
            </div>
        </div>
    </main>

    <div id="booking-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[100] p-6 opacity-0 transition-opacity duration-300">
        <div class="glass p-10 rounded-3xl w-full max-w-lg shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content">
            <div class="flex justify-between items-start mb-8">
                <h2 id="modal-title" class="text-3xl font-extrabold text-white tracking-tight">Xác nhận đặt vé</h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white transition p-2 rounded-full hover:bg-slate-800">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18"></path></svg>
                </button>
            </div>
            
            <input type="hidden" id="selected-movie-id">
            
            <div class="space-y-6 mb-10 text-slate-300">
                <div class="glass p-5 rounded-2xl">
                    <p class="text-sm text-slate-500 mb-1">Phim đã chọn:</p>
                    <p id="modal-movie-name" class="text-2xl font-bold text-cyan-400">Tên phim</p>
                    <p id="modal-movie-price" class="text-lg font-mono text-white mt-1">0 VNĐ</p>
                </div>
                <div>
                    <label class="block text-base mb-3 font-medium text-slate-400">Nhập ID Người dùng (để xác thực):</label>
                    <input type="number" id="user-id" 
                           class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition text-white placeholder:text-slate-600 text-lg" 
                           placeholder="Ví dụ: 1">
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="submitBooking()" 
                        class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold rounded-2xl transition transform active:scale-95 shadow-lg text-lg flex items-center justify-center gap-3">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
                    Xác Nhận Đặt Vé Ngay
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 glass p-4 rounded-2xl shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        </div>

    <script src="script.js"></script>
</body>
</html>
